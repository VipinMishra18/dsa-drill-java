<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DSA 7-Minute Drill — Java</title>
<style>
  :root{
    --bg:#15181e; --bg2:#1b1e26; --bg3:#21252e; --code-bg:#181b21;
    --edge:#282d38; --edge2:#353c49;
    --fg:#d7dce4; --dim:#8b93a1; --faint:#5c6470;
    --accent:#e0a45e; --accent2:#f0bd82; --good:#6cc59a; --danger:#e17d6b;
    --k:#c79ce0; --t:#68b6c9; --s:#9ecb7a; --n:#d9976b; --c:#616b78; --a:#d8c06a;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,"JetBrains Mono","Fira Code",Menlo,Consolas,monospace;
    --ui:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--fg);font-family:var(--ui);-webkit-font-smoothing:antialiased;overflow:hidden}
  .app{display:grid;grid-template-columns:322px 1fr;height:100vh;height:100dvh}
  .sidebar{background:var(--bg2);border-right:1px solid var(--edge);display:flex;flex-direction:column;min-height:0}
  .side-head{padding:18px 18px 12px;border-bottom:1px solid var(--edge);display:flex;flex-direction:column;gap:12px}
  .brand{display:flex;align-items:baseline;gap:9px}
  .brand b{font-size:15px;font-weight:650;letter-spacing:.2px}
  .brand .java{color:var(--accent);font-weight:650}
  .brand .cnt{margin-left:auto;font-size:11px;color:var(--faint);font-variant-numeric:tabular-nums}
  .tag-src{font-size:10.5px;color:var(--faint);letter-spacing:.4px;text-transform:uppercase}
  .search{position:relative}
  .search input{width:100%;background:var(--bg3);border:1px solid var(--edge2);color:var(--fg);border-radius:8px;padding:9px 11px 9px 30px;font-size:13px;font-family:var(--ui);outline:none}
  .search input:focus{border-color:var(--accent)}
  .search svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--faint)}
  .chips{display:flex;flex-wrap:wrap;gap:6px;max-height:120px;overflow:auto}
  .chip{font-size:11px;padding:4px 9px;border-radius:999px;border:1px solid var(--edge2);background:transparent;color:var(--dim);cursor:pointer;white-space:nowrap;transition:.12s}
  .chip:hover{color:var(--fg);border-color:var(--faint)}
  .chip.on{background:var(--accent);color:#1a1206;border-color:var(--accent);font-weight:600}
  .list{flex:1;overflow:auto;padding:6px}
  .item{display:flex;align-items:flex-start;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;border:1px solid transparent}
  .item:hover{background:var(--bg3)}
  .item.on{background:var(--bg3);border-color:var(--edge2)}
  .item .num{font-size:11px;color:var(--faint);font-variant-numeric:tabular-nums;min-width:26px;padding-top:1px}
  .item.on .num{color:var(--accent)}
  .item .body{min-width:0}
  .item .ttl{font-size:13.5px;line-height:1.3}
  .new{font-size:8.5px;letter-spacing:.5px;color:var(--good);border:1px solid var(--good);border-radius:4px;padding:0 4px;vertical-align:middle;margin-left:5px}
  .item .tps{margin-top:3px;font-size:10.5px;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .empty{padding:24px 14px;color:var(--faint);font-size:13px;text-align:center}
  .main{display:flex;flex-direction:column;min-width:0;min-height:0}
  .topbar{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--edge);flex-wrap:wrap}
  .menu{display:none}
  .crumb{min-width:0;flex:1}
  .crumb h1{margin:0;font-size:16px;font-weight:600;letter-spacing:.2px;text-wrap:balance;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .crumb .meta{margin-top:4px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .pill{font-size:10.5px;padding:2px 8px;border-radius:999px;background:var(--bg3);border:1px solid var(--edge2);color:var(--dim)}
  .pill.file{color:var(--accent);border-color:transparent;background:transparent;font-family:var(--mono);padding-left:0}
  .controls{display:flex;align-items:center;gap:8px}
  .btn{display:inline-flex;align-items:center;gap:6px;font-family:var(--ui);font-size:12.5px;background:var(--bg3);color:var(--fg);border:1px solid var(--edge2);border-radius:8px;padding:7px 11px;cursor:pointer;transition:.12s;white-space:nowrap}
  .btn:hover{border-color:var(--faint)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn.primary{background:var(--accent);color:#1a1206;border-color:var(--accent);font-weight:600}
  .btn.primary:hover{background:var(--accent2)}
  .icon-btn{padding:7px 9px}
  .toggle{display:inline-flex;align-items:center;gap:8px;font-size:12px;color:var(--dim);cursor:pointer;user-select:none}
  .toggle .track{width:36px;height:20px;border-radius:999px;background:var(--edge2);position:relative;transition:.15s}
  .toggle .knob{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--fg);transition:.15s}
  .toggle.on .track{background:var(--accent)}
  .toggle.on .knob{left:18px;background:#1a1206}
  .toggle.on{color:var(--accent2)}
  .timer{font-family:var(--mono);font-size:13px;font-variant-numeric:tabular-nums;color:var(--dim);padding:5px 9px;border:1px solid var(--edge2);border-radius:8px;min-width:58px;text-align:center}
  .timer.warn{color:var(--accent2);border-color:var(--accent)}
  .timer.crit{color:var(--danger);border-color:var(--danger)}
  .viewer{flex:1;min-height:0;display:flex;flex-direction:column}
  .code-wrap{flex:1;min-height:0;overflow:auto;display:flex;background:var(--code-bg)}
  .gutter{position:sticky;left:0;flex:0 0 auto;background:var(--code-bg);border-right:1px solid var(--edge);color:var(--faint);text-align:right;padding:18px 12px 40px 18px;margin:0;white-space:pre;user-select:none;font-family:var(--mono);font-size:13px;line-height:1.62}
  pre.code{margin:0;padding:18px 22px 40px;white-space:pre;font-family:var(--mono);font-size:13px;line-height:1.62;flex:1}
  .code .k{color:var(--k)} .code .t{color:var(--t)} .code .s{color:var(--s)}
  .code .n{color:var(--n)} .code .c{color:var(--c);font-style:italic} .code .a{color:var(--a)}
  .drill{flex:1;display:flex;align-items:center;justify-content:center;padding:24px}
  .drill-card{max-width:440px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:18px}
  .drill-card .eyebrow{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint)}
  .drill-card h2{margin:0;font-size:24px;font-weight:650;text-wrap:balance}
  .drill-card .bigtime{font-family:var(--mono);font-size:52px;font-variant-numeric:tabular-nums;line-height:1;color:var(--accent)}
  .drill-card .bigtime.crit{color:var(--danger)}
  .drill-card p{margin:0;color:var(--dim);font-size:13.5px;line-height:1.6;max-width:340px}
  .drill-card .tps{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
  .foot{border-top:1px solid var(--edge);padding:8px 20px;font-size:11px;color:var(--faint);display:flex;gap:16px;flex-wrap:wrap;align-items:center}
  .foot kbd{font-family:var(--mono);background:var(--bg3);border:1px solid var(--edge2);border-bottom-width:2px;border-radius:4px;padding:1px 5px;color:var(--dim);font-size:10.5px}
  .foot a{color:var(--dim)}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(12px);opacity:0;background:var(--bg3);border:1px solid var(--edge2);color:var(--fg);padding:8px 16px;border-radius:8px;font-size:12.5px;transition:.18s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .scrim{display:none}
  @media (max-width:820px){
    .app{grid-template-columns:1fr}
    .sidebar{position:fixed;z-index:30;top:0;bottom:0;left:0;width:300px;transform:translateX(-102%);transition:transform .2s;box-shadow:0 0 40px rgba(0,0,0,.5)}
    .app.nav .sidebar{transform:none}
    .menu{display:inline-flex}
    .scrim{display:block;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:20;opacity:0;pointer-events:none;transition:.2s}
    .app.nav .scrim{opacity:1;pointer-events:auto}
    .crumb h1{font-size:15px}
  }
  /* ---- motion ---- */
  @keyframes slideL{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:none}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  @keyframes codeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes cardIn{from{opacity:0;transform:scale(.955)}to{opacity:1;transform:none}}
  @keyframes itemIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.07);opacity:.72}}
  @keyframes tick{from{transform:scale(1.14)}to{transform:scale(1)}}
  .sidebar{animation:slideL .34s cubic-bezier(.22,.61,.36,1) both}
  .main{animation:fadeUp .44s cubic-bezier(.22,.61,.36,1) both}
  .code-wrap{animation:codeIn .24s ease both}
  .drill-card{animation:cardIn .28s cubic-bezier(.22,.61,.36,1) both}
  .list.intro .item{animation:itemIn .32s ease both}
  .btn{transition:.13s;will-change:transform}
  .btn:hover{transform:translateY(-1px)}
  .btn:active{transform:translateY(0) scale(.97)}
  .btn.primary:hover{box-shadow:0 4px 16px -4px var(--accent)}
  .chip{transition:.13s}
  .chip:active{transform:scale(.92)}
  .item{transition:background .13s,border-color .13s,transform .1s}
  .item:active{transform:scale(.99)}
  .item.on{box-shadow:inset 2px 0 0 var(--accent)}
  .timer{transition:color .2s,border-color .2s}
  .timer.crit{animation:pulse 1s ease-in-out infinite}
  .bigtime{transition:color .2s}
  .bigtime.crit{animation:pulse 1.15s ease-in-out infinite}
  .brand .java{position:relative}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>

<script>
const DATA = [{"title": "Divisors", "topics": [], "file": "Divisors.java", "code": "import java.util.*;\n\n// Only loop to sqrt(num) =\u003e reduces time from O(n) -\u003e O(sqrt(n)).\n// When i divides num, its pair num/i lives past sqrt(num), so we collect both.\nclass Divisors {\n    static List\u003cInteger\u003e findDivisors(int num) {\n        List\u003cInteger\u003e divisors = new ArrayList\u003c\u003e();\n        for (int i = 1; (long) i * i \u003c= num; i++) {\n            if (num % i == 0) {\n                divisors.add(i);\n                if (num / i != i) divisors.add(num / i);\n            }\n        }\n        return divisors;\n    }\n}", "extra": false, "n": 1}, {"title": "Prefix Sum", "topics": ["Array", "Prefix Sum"], "file": "PrefixSum.java", "code": "class PrefixSum {\n    static int[] prefixSum(int[] nums) {\n        int n = nums.length;\n        int[] ans = new int[n];\n        ans[0] = nums[0];\n        for (int i = 1; i \u003c n; i++) {\n            ans[i] = ans[i - 1] + nums[i];\n        }\n        return ans;\n    }\n}", "extra": false, "n": 2}, {"title": "Merge Sort", "topics": ["Sorting"], "file": "MergeSort.java", "code": "class MergeSort {\n    int[] sortArray(int[] nums) {\n        return mergeSort(nums, 0, nums.length - 1);\n    }\n\n    private int[] mergeSort(int[] nums, int l, int r) {\n        if (l == r) return new int[]{nums[l]};\n        int m = l + (r - l) / 2;\n        int[] left = mergeSort(nums, l, m);\n        int[] right = mergeSort(nums, m + 1, r);\n        return merge(left, right);\n    }\n\n    private int[] merge(int[] left, int[] right) {\n        int i = 0, j = 0, n = left.length, m = right.length, k = 0;\n        int[] ans = new int[n + m];\n        while (i \u003c n \u0026\u0026 j \u003c m) ans[k++] = left[i] \u003c right[j] ? left[i++] : right[j++];\n        while (i \u003c n) ans[k++] = left[i++];\n        while (j \u003c m) ans[k++] = right[j++];\n        return ans;\n    }\n}", "extra": false, "n": 3}, {"title": "Upper Bound", "topics": ["Binary search"], "file": "UpperBound.java", "code": "// Return index of first element strictly greater than val.\n// If all values are \u003c= val, returns nums.length (end).\nclass UpperBound {\n    static int upperBound(int[] nums, int val) {\n        int n = nums.length;\n        int l = 0, r = n - 1, ans = n;\n        while (l \u003c= r) {\n            int m = l + (r - l) / 2;\n            if (nums[m] \u003e val) {\n                ans = m;\n                r = m - 1;\n            } else {\n                l = m + 1;\n            }\n        }\n        return ans;\n    }\n}", "extra": false, "n": 4}, {"title": "Lower Bound", "topics": ["Binary search"], "file": "LowerBound.java", "code": "// If val exists -\u003e first occurrence index.\n// Else -\u003e index of next greater element; if none greater -\u003e nums.length (end).\nclass LowerBound {\n    static int lowerBound(int[] nums, int val) {\n        int n = nums.length;\n        int l = 0, r = n - 1, ans = n;\n        while (l \u003c= r) {\n            int m = l + (r - l) / 2;\n            if (nums[m] \u003e= val) {\n                ans = m;\n                r = m - 1;\n            } else {\n                l = m + 1;\n            }\n        }\n        return ans;\n    }\n}", "extra": false, "n": 5}, {"title": "Pivot", "topics": ["Binary search"], "file": "Pivot.java", "code": "// Index of the smallest element (rotation point) in a rotated sorted array.\nclass Pivot {\n    static int pivot(int[] nums) {\n        int n = nums.length;\n        int l = 0, r = n - 1;\n\n        // Only needed if duplicates present (TC: O(n))\n        while (l \u003c n - 1 \u0026\u0026 nums[l] == nums[l + 1]) l++;\n        while (r \u003e 0 \u0026\u0026 nums[r - 1] == nums[r]) r--;\n\n        while (l \u003c r) {\n            int m = l + (r - l) / 2;\n            if (nums[m] \u003e nums[r]) {\n                l = m + 1;\n            } else {\n                r = m;\n            }\n        }\n        return l;\n    }\n}", "extra": false, "n": 6}, {"title": "Rotated search", "topics": ["Binary search"], "file": "RotatedSearch.java", "code": "// Search a value in a rotated sorted array.\n// Plan (from the original stub):\n//   find pivot idx\n//   search(0, pivot - 1)\n//   search(pivot, n - 1)\nclass RotatedSearch {\n    static int rotatedSearch(int[] nums, int val) {\n        int n = nums.length;\n        int p = pivot(nums);\n        int idx = binarySearch(nums, 0, p - 1, val);\n        if (idx != -1) return idx;\n        return binarySearch(nums, p, n - 1, val);\n    }\n\n    private static int pivot(int[] nums) {\n        int l = 0, r = nums.length - 1;\n        while (l \u003c r) {\n            int m = l + (r - l) / 2;\n            if (nums[m] \u003e nums[r]) l = m + 1;\n            else r = m;\n        }\n        return l;\n    }\n\n    private static int binarySearch(int[] nums, int l, int r, int val) {\n        while (l \u003c= r) {\n            int m = l + (r - l) / 2;\n            if (nums[m] == val) return m;\n            if (nums[m] \u003c val) l = m + 1;\n            else r = m - 1;\n        }\n        return -1;\n    }\n}", "extra": false, "n": 7}, {"title": "Find Peak Element", "topics": ["Binary search"], "file": "FindPeakElement.java", "code": "// https://leetcode.com/problems/find-peak-element/\n// A peak is strictly greater than its neighbors. nums[-1] = nums[n] = -inf.\n// nums[i] != nums[i + 1] for all valid i. Return any peak index.\nclass FindPeakElement {\n    static int findPeakElement(int[] nums) {\n        int n = nums.length;\n        int l = 0, r = n - 1;\n        while (l \u003c r) {\n            int m = l + (r - l) / 2;\n            if (nums[m] \u003c nums[m + 1]) {\n                l = m + 1;\n            } else {\n                r = m;\n            }\n        }\n        return l;\n    }\n}", "extra": false, "n": 8}, {"title": "Single Element In Sorted Array", "topics": ["Binary search"], "file": "SingleElementInSortedArray.java", "code": "// Input:  [1,1,2,3,3,4,4,8,8]  -\u003e Output: 2\n// The single element breaks the even/odd pairing order.\n// Binary search toward the disturbed half based on whether mid is even/odd.\nclass SingleElementInSortedArray {\n    static int singleNonDuplicate(int[] nums) {\n        int n = nums.length;\n        int l = 0, r = n - 1;\n        while (l \u003c r) {\n            int m = l + (r - l) / 2;\n            if ((m \u0026 1) == 1) m--; // make it even if it's odd\n            if (nums[m] == nums[m + 1]) {\n                l = m + 2;\n            } else {\n                r = m;\n            }\n        }\n        return nums[l];\n    }\n}", "extra": false, "n": 9}, {"title": "Square Root Floor", "topics": ["Math", "Binary search"], "file": "SquareRootFloor.java", "code": "class SquareRootFloor {\n    static int squareRootFloorValue(int num) {\n        if (num \u003c= 1) return num;\n        int l = 0, r = num, ans = -1;\n        while (l \u003c= r) {\n            int m = l + (r - l) / 2;\n            if (m \u003c= num / m) { // use division, not m*m, to avoid overflow\n                ans = m;\n                l = m + 1;\n            } else {\n                r = m - 1;\n            }\n        }\n        return ans;\n    }\n}", "extra": false, "n": 10}, {"title": "List Node", "topics": ["Linked List"], "file": "ListNode.java", "code": "// Singly linked list node (shared type).\nclass ListNode {\n    int val;\n    ListNode next;\n    ListNode() {}\n    ListNode(int val) { this.val = val; }\n    ListNode(int val, ListNode next) { this.val = val; this.next = next; }\n}", "extra": false, "n": 11}, {"title": "List length", "topics": ["Linked List"], "file": "ListLength.java", "code": "class ListLength {\n    static int len(ListNode head) {\n        int ans = 0;\n        while (head != null) {\n            ans++;\n            head = head.next;\n        }\n        return ans;\n    }\n}", "extra": false, "n": 12}, {"title": "Copy list", "topics": ["Linked List"], "file": "CopyList.java", "code": "class CopyList {\n    static ListNode copyList(ListNode head) {\n        ListNode dummy = new ListNode();\n        ListNode temp = dummy;\n        while (head != null) {\n            temp.next = new ListNode(head.val);\n            temp = temp.next;\n            head = head.next;\n        }\n        return dummy.next;\n    }\n}", "extra": false, "n": 13}, {"title": "Reverse list(Iterative)", "topics": ["Linked List"], "file": "ReverseListIterative.java", "code": "class ReverseListIterative {\n    static ListNode reverse(ListNode head) {\n        ListNode prev = null, curr = head;\n        while (curr != null) {\n            ListNode temp = curr.next;\n            curr.next = prev;\n            prev = curr;\n            curr = temp;\n        }\n        return prev;\n    }\n}", "extra": false, "n": 14}, {"title": "Reverse list(Recursive)", "topics": ["Linked List"], "file": "ReverseListRecursive.java", "code": "class ReverseListRecursive {\n    static ListNode reverse(ListNode head) {\n        if (head == null || head.next == null) return head;\n        ListNode newHead = reverse(head.next);\n        head.next.next = head;\n        head.next = null;\n        return newHead;\n    }\n}", "extra": false, "n": 15}, {"title": "Remove Nth from end", "topics": ["Linked List"], "file": "RemoveNthFromEnd.java", "code": "class RemoveNthFromEnd {\n    static ListNode removeNthFromEnd(ListNode head, int n) {\n        int l = ListLength.len(head);\n        if (n == l) {\n            return head.next;\n        }\n        ListNode temp = head;\n        int skip = l - n - 1;\n        while (skip-- \u003e 0) {\n            temp = temp.next;\n        }\n        temp.next = temp.next.next; // unlink (Java GC handles the delete)\n        return head;\n    }\n}", "extra": false, "n": 16}, {"title": "Doubly Linked Node", "topics": ["Linked List"], "file": "Node.java", "code": "// Doubly linked list node with key+val (shared type, used by DLL / LRUCache).\nclass Node {\n    int key, val;\n    Node prev, next;\n    Node(int k, int v) { key = k; val = v; }\n}", "extra": false, "n": 17}, {"title": "Doubly linked list", "topics": ["Doubly Linked List"], "file": "DLL.java", "code": "// Partial doubly linked list with sentinel head/tail.\n// Built to support LRU Cache for now (matches the original note).\nclass DLL {\n    Node head, tail;\n\n    DLL() {\n        head = new Node(-1, -1);\n        tail = new Node(-1, -1);\n        head.next = tail;\n        tail.prev = head;\n    }\n\n    void insertFront(Node node) {\n        node.next = head.next;\n        node.prev = head;\n        head.next.prev = node;\n        head.next = node;\n    }\n\n    void remove(Node node) {\n        node.prev.next = node.next;\n        node.next.prev = node.prev;\n    }\n\n    Node getLast() {\n        if (tail.prev == head) return null;\n        return tail.prev;\n    }\n}", "extra": false, "n": 18}, {"title": "LRU cache", "topics": ["Doubly Linked List", "Implementation"], "file": "LRUCache.java", "code": "import java.util.*;\n\n// PUT() -\u003e O(1), GET() -\u003e O(1)\nclass LRUCache {\n    private int capacity;\n    private DLL list = new DLL();\n    private Map\u003cInteger, Node\u003e mp = new HashMap\u003c\u003e();\n\n    LRUCache(int cap) {\n        capacity = cap;\n    }\n\n    int get(int k) {\n        if (!mp.containsKey(k)) return -1;\n        Node node = mp.get(k);\n        list.remove(node);\n        list.insertFront(node);\n        return node.val;\n    }\n\n    void put(int k, int v) {\n        if (capacity == 0) return;\n\n        if (mp.containsKey(k)) {\n            Node node = mp.get(k);\n            node.val = v;\n            list.remove(node);\n            list.insertFront(node);\n        } else {\n            if (mp.size() == capacity) {\n                Node node = list.getLast();\n                mp.remove(node.key);\n                list.remove(node);\n            }\n            Node node = new Node(k, v);\n            list.insertFront(node);\n            mp.put(k, node);\n        }\n    }\n}", "extra": false, "n": 19}, {"title": "Interval overlap", "topics": ["Interval"], "file": "IntervalOverlap.java", "code": "// Two intervals [start, end] share interior (strict overlap). Order-independent.\nclass IntervalOverlap {\n    static boolean overlap(int[] p1, int[] p2) {\n        int[] lo = p1[0] \u003c= p2[0] ? p1 : p2;\n        int[] hi = p1[0] \u003c= p2[0] ? p2 : p1;\n        return lo[1] \u003e hi[0];\n    }\n}", "extra": false, "n": 20}, {"title": "Interval overlap or touch", "topics": ["Interval"], "file": "IntervalOverlapOrTouch.java", "code": "// Two intervals overlap OR touch at an endpoint. Order-independent.\nclass IntervalOverlapOrTouch {\n    static boolean overlapOrTouch(int[] p1, int[] p2) {\n        int[] lo = p1[0] \u003c= p2[0] ? p1 : p2;\n        int[] hi = p1[0] \u003c= p2[0] ? p2 : p1;\n        return lo[1] \u003e= hi[0];\n    }\n}", "extra": false, "n": 21}, {"title": "Interval non-overlapping", "topics": ["Interval"], "file": "IntervalNonOverlapping.java", "code": "// Two intervals are strictly non-overlapping. Order-independent.\nclass IntervalNonOverlapping {\n    static boolean nonOverlapping(int[] p1, int[] p2) {\n        int[] lo = p1[0] \u003c= p2[0] ? p1 : p2;\n        int[] hi = p1[0] \u003c= p2[0] ? p2 : p1;\n        return lo[1] \u003c hi[0];\n    }\n}", "extra": false, "n": 22}, {"title": "Merge Intervals", "topics": ["Interval"], "file": "MergeIntervals.java", "code": "import java.util.*;\n\nclass MergeIntervals {\n    static int[][] mergeInterval(int[][] intervals) {\n        if (intervals.length \u003c 2) return intervals;\n\n        Arrays.sort(intervals, (a, b) -\u003e\n            a[0] != b[0] ? Integer.compare(a[0], b[0]) : Integer.compare(a[1], b[1]));\n\n        List\u003cint[]\u003e ans = new ArrayList\u003c\u003e();\n        int[] prev = {intervals[0][0], intervals[0][1]};\n        int n = intervals.length;\n        for (int i = 1; i \u003c n; i++) {\n            int[] curr = {intervals[i][0], intervals[i][1]};\n            if (IntervalOverlapOrTouch.overlapOrTouch(prev, curr)) {\n                prev = new int[]{Math.min(prev[0], curr[0]), Math.max(prev[1], curr[1])};\n                continue;\n            }\n            ans.add(prev);\n            prev = curr;\n        }\n        ans.add(prev);\n        return ans.toArray(new int[0][]);\n    }\n}", "extra": false, "n": 23}, {"title": "TreeNode", "topics": ["Tree"], "file": "TreeNode.java", "code": "// Binary tree node (shared type).\nclass TreeNode {\n    int val;\n    TreeNode left, right;\n    TreeNode() {}\n    TreeNode(int val) { this.val = val; }\n    TreeNode(int val, TreeNode left, TreeNode right) { this.val = val; this.left = left; this.right = right; }\n}", "extra": false, "n": 24}, {"title": "Tree Traversals", "topics": ["Tree"], "file": "TreeTraversals.java", "code": "import java.util.*;\n\n// The three depth-first orders, each returning the visited values.\nclass TreeTraversals {\n    static List\u003cInteger\u003e preorder(TreeNode root) {\n        List\u003cInteger\u003e a = new ArrayList\u003c\u003e();\n        pre(root, a);\n        return a;\n    }\n\n    static List\u003cInteger\u003e inorder(TreeNode root) {\n        List\u003cInteger\u003e a = new ArrayList\u003c\u003e();\n        in(root, a);\n        return a;\n    }\n\n    static List\u003cInteger\u003e postorder(TreeNode root) {\n        List\u003cInteger\u003e a = new ArrayList\u003c\u003e();\n        post(root, a);\n        return a;\n    }\n\n    private static void pre(TreeNode r, List\u003cInteger\u003e a) {\n        if (r == null) return;\n        a.add(r.val);        // visit\n        pre(r.left, a);\n        pre(r.right, a);\n    }\n\n    private static void in(TreeNode r, List\u003cInteger\u003e a) {\n        if (r == null) return;\n        in(r.left, a);\n        a.add(r.val);        // visit\n        in(r.right, a);\n    }\n\n    private static void post(TreeNode r, List\u003cInteger\u003e a) {\n        if (r == null) return;\n        post(r.left, a);\n        post(r.right, a);\n        a.add(r.val);        // visit\n    }\n}", "extra": false, "n": 25}, {"title": "Depth of tree", "topics": ["Tree"], "file": "TreeDepth.java", "code": "class TreeDepth {\n    static int depth(TreeNode root) {\n        if (root == null) return 0;\n        int left = depth(root.left);\n        int right = depth(root.right);\n        return 1 + Math.max(left, right);\n    }\n}", "extra": false, "n": 26}, {"title": "Tree Diameter", "topics": ["Tree"], "file": "TreeDiameter.java", "code": "// Diameter = longest path (in edges) between any two nodes; may not pass root.\nclass TreeDiameter {\n    static int treeDiameter(TreeNode root) {\n        int[] ans = {0};\n        depth(root, ans);\n        return ans[0];\n    }\n\n    private static int depth(TreeNode root, int[] ans) {\n        if (root == null) return 0;\n        int left = depth(root.left, ans);\n        int right = depth(root.right, ans);\n        ans[0] = Math.max(ans[0], left + right); // left+right = edges; +1 = nodes\n        return 1 + Math.max(left, right);\n    }\n}", "extra": false, "n": 27}, {"title": "Same Tree | Symmetric Tree", "topics": ["Tree"], "file": "SameTree.java", "code": "class SameTree {\n    static boolean sameTree(TreeNode root1, TreeNode root2) {\n        if (root1 == null \u0026\u0026 root2 == null) return true;\n        if (root1 == null || root2 == null) return false;\n        if (root1.val != root2.val) return false;\n        return sameTree(root1.left, root2.left) \u0026\u0026 sameTree(root1.right, root2.right);\n    }\n\n    // Symmetric = flip the branches when comparing.\n    static boolean symmetric(TreeNode root1, TreeNode root2) {\n        if (root1 == null \u0026\u0026 root2 == null) return true;\n        if (root1 == null || root2 == null) return false;\n        if (root1.val != root2.val) return false;\n        return symmetric(root1.left, root2.right) \u0026\u0026 symmetric(root1.right, root2.left);\n    }\n}", "extra": false, "n": 28}, {"title": "Sub Tree", "topics": ["Tree"], "file": "SubTree.java", "code": "class SubTree {\n    static boolean isSubTree(TreeNode root, TreeNode subTree) {\n        if (root == null) return false;\n        if (subTree == null) return true;\n        if (SameTree.sameTree(root, subTree)) return true;\n        return isSubTree(root.left, subTree) || isSubTree(root.right, subTree);\n    }\n}", "extra": false, "n": 29}, {"title": "Tree Node Path", "topics": ["Tree"], "file": "TreeNodePath.java", "code": "import java.util.*;\n\n// Fills `ans` with the root-\u003etarget path; returns whether target was found.\nclass TreeNodePath {\n    static boolean path(TreeNode root, TreeNode target, List\u003cTreeNode\u003e ans) {\n        if (root == null) return false;\n        ans.add(root);\n        if (root == target) return true;\n        if (path(root.left, target, ans) || path(root.right, target, ans)) return true;\n        ans.remove(ans.size() - 1);\n        return false;\n    }\n}", "extra": false, "n": 30}, {"title": "Tree To Graph", "topics": ["Tree"], "file": "TreeToGraph.java", "code": "import java.util.*;\n\n// Convert a binary tree into an undirected adjacency-list graph keyed by node value.\nclass TreeToGraph {\n    static Map\u003cInteger, List\u003cInteger\u003e\u003e treeToGraph(TreeNode root) {\n        Map\u003cInteger, List\u003cInteger\u003e\u003e graph = new HashMap\u003c\u003e();\n        build(root, null, graph);\n        return graph;\n    }\n\n    private static void build(TreeNode r, TreeNode p, Map\u003cInteger, List\u003cInteger\u003e\u003e graph) {\n        if (r != null \u0026\u0026 p != null) {\n            graph.computeIfAbsent(p.val, k -\u003e new ArrayList\u003c\u003e()).add(r.val);\n            graph.computeIfAbsent(r.val, k -\u003e new ArrayList\u003c\u003e()).add(p.val);\n        }\n        if (r.left != null) build(r.left, r, graph);\n        if (r.right != null) build(r.right, r, graph);\n    }\n}", "extra": false, "n": 31}, {"title": "Valid BST", "topics": ["Tree"], "file": "ValidBST.java", "code": "class ValidBST {\n    static boolean isValidBst(TreeNode root) {\n        return dfs(root, Long.MIN_VALUE, Long.MAX_VALUE);\n    }\n\n    private static boolean dfs(TreeNode root, long left, long right) {\n        if (root == null) return true;\n        if (!(root.val \u003e left \u0026\u0026 root.val \u003c right)) return false;\n        return dfs(root.left, left, root.val) \u0026\u0026 dfs(root.right, root.val, right);\n    }\n}", "extra": false, "n": 32}, {"title": "Subarray Minimum", "topics": ["Array", "DP"], "file": "SubarrayMinimum.java", "code": "// Minimum subarray sum (Kadane, min variant).\nclass SubarrayMinimum {\n    static int subarrayMinimum(int[] nums) {\n        int ans = Integer.MAX_VALUE, sum = 0;\n        for (int num : nums) {\n            sum += num;\n            if (num \u003c sum) sum = num;\n            ans = Math.min(ans, sum);\n        }\n        return ans;\n    }\n}", "extra": false, "n": 33}, {"title": "Subarray Maximum", "topics": ["Array", "DP"], "file": "SubarrayMaximum.java", "code": "// Maximum subarray sum (Kadane).\nclass SubarrayMaximum {\n    static int subarrayMaximum(int[] nums) {\n        int ans = Integer.MIN_VALUE, sum = 0;\n        for (int num : nums) {\n            sum += num;\n            if (num \u003e sum) sum = num;\n            ans = Math.max(ans, sum);\n        }\n        return ans;\n    }\n}", "extra": false, "n": 34}, {"title": "Two Sum", "topics": ["Array", "Hash Map"], "file": "TwoSum.java", "code": "import java.util.*;\n\nclass TwoSum {\n    static int[] twoSum(int[] nums, int target) {\n        int n = nums.length;\n        Map\u003cInteger, Integer\u003e mp = new HashMap\u003c\u003e();\n        for (int i = 0; i \u003c n; i++) {\n            int need = target - nums[i];\n            if (mp.containsKey(need)) return new int[]{mp.get(need), i};\n            mp.put(nums[i], i);\n        }\n        return new int[]{-1, -1};\n    }\n}", "extra": false, "n": 35}, {"title": "Longest subarray of K sum", "topics": ["Array", "Hash Map", "Sliding Window"], "file": "LongestSubarrayOfKSum.java", "code": "import java.util.*;\n\nclass LongestSubarrayOfKSum {\n    // HASHMAP =\u003e works for any integers (handles negatives).\n    static int hashMap(int[] nums, int k) {\n        int n = nums.length, sum = 0, ans = 0;\n        Map\u003cInteger, Integer\u003e mp = new HashMap\u003c\u003e();\n        mp.put(0, -1);\n        for (int i = 0; i \u003c n; i++) {\n            sum += nums[i];\n            if (mp.containsKey(sum - k)) ans = Math.max(ans, i - mp.get(sum - k));\n            if (!mp.containsKey(sum)) mp.put(sum, i); // first occurrence of this prefix sum\n        }\n        return ans;\n    }\n\n    // SLIDING WINDOW =\u003e positive numbers only.\n    static int slidingWindow(int[] nums, int k) {\n        int n = nums.length, sum = 0, ans = 0;\n        for (int i = 0, j = 0; j \u003c n; j++) {\n            sum += nums[j];\n            while (i \u003c= j \u0026\u0026 sum \u003e k) sum -= nums[i++];\n            if (sum == k) ans = Math.max(ans, j - i + 1); // drop this check for \"at least k\"\n        }\n        return ans;\n    }\n}", "extra": false, "n": 36}, {"title": "Longest subarray of balanced", "topics": ["Subarray", "Hash Map"], "file": "LongestSubarrayBalanced.java", "code": "import java.util.*;\n\n// nums is binary; \"balanced\" = equal count of 0s and 1s.\nclass LongestSubarrayBalanced {\n    static int longestSubarrayWithBalance(int[] nums) {\n        int n = nums.length, ans = 0, b = 0;\n        Map\u003cInteger, Integer\u003e mp = new HashMap\u003c\u003e();\n        mp.put(0, -1);\n        for (int i = 0; i \u003c n; i++) {\n            b += nums[i] == 1 ? 1 : -1;\n            if (mp.containsKey(b)) ans = Math.max(ans, i - mp.get(b));\n            if (!mp.containsKey(b)) mp.put(b, i); // first occurrence\n        }\n        return ans;\n    }\n}", "extra": false, "n": 37}, {"title": "Count subarray of K sum", "topics": ["Array", "Hash Map", "Prefix Sum"], "file": "CountSubarrayOfKSum.java", "code": "import java.util.*;\n\nclass CountSubarrayOfKSum {\n    // HASHMAP: track frequency of prefix sums; count complements (sum - k).\n    static int hashMap(int[] nums, int k) {\n        int n = nums.length, sum = 0, ans = 0;\n        Map\u003cInteger, Integer\u003e mp = new HashMap\u003c\u003e();\n        mp.put(0, 1);\n        for (int i = 0; i \u003c n; i++) {\n            sum += nums[i];\n            if (mp.containsKey(sum - k)) ans += mp.get(sum - k);\n            mp.merge(sum, 1, Integer::sum);\n        }\n        return ans;\n    }\n\n    // PREFIX SUM: brute-force O(n^2) over prefix-sum differences.\n    static int prefixSum(int[] nums, int k) {\n        int n = nums.length;\n        int[] pre = new int[n + 1];\n        for (int i = 1; i \u003c n + 1; i++) pre[i] = pre[i - 1] + nums[i - 1];\n        int ans = 0;\n        for (int i = 0; i \u003c n; i++)\n            for (int j = i + 1; j \u003c n + 1; j++)\n                if (pre[j] - pre[i] == k) ans++;\n        return ans;\n    }\n}", "extra": false, "n": 38}, {"title": "Point inside rectangle", "topics": ["Geometry"], "file": "PointInsideRectangle.java", "code": "// point = {x, y}; rect = {{x1,y1}, {x2,y2}} opposite corners. Strictly inside.\nclass PointInsideRectangle {\n    static boolean pointInsideRect(int[] point, int[][] rect) {\n        int x = point[0], y = point[1];\n        int xmin = Math.min(rect[0][0], rect[1][0]);\n        int xmax = Math.max(rect[0][0], rect[1][0]);\n        int ymin = Math.min(rect[0][1], rect[1][1]);\n        int ymax = Math.max(rect[0][1], rect[1][1]);\n        return x \u003e xmin \u0026\u0026 x \u003c xmax \u0026\u0026 y \u003e ymin \u0026\u0026 y \u003c ymax;\n    }\n}", "extra": false, "n": 39}, {"title": "Reverse Bits", "topics": ["Bitwise"], "file": "ReverseBits.java", "code": "// Full reversal of a 32-bit integer's bits.\n// 43261596  00000010100101000001111010011100\n// 964176192 00111001011110000010100101000000\nclass ReverseBits {\n    static int reverseBits(int n) {\n        int ans = 0;\n        for (int i = 31; i \u003e -1; i--) {\n            ans |= (n \u0026 1) \u003c\u003c i;\n            n \u003e\u003e\u003e= 1; // unsigned right shift\n        }\n        return ans;\n    }\n}", "extra": false, "n": 40}, {"title": "Hamming Weight", "topics": ["Bitwise"], "file": "HammingWeight.java", "code": "class HammingWeight {\n    static int hammingWeight(int n) {\n        int ans = 0;\n        for (int i = 0; i \u003c 32; i++) {\n            ans += (n \u0026 1);\n            n \u003e\u003e\u003e= 1;\n        }\n        return ans;\n    }\n}", "extra": false, "n": 41}, {"title": "Second Maximum Element", "topics": ["Array"], "file": "SecondMaximumElement.java", "code": "class SecondMaximumElement {\n    static int secondMaxElement(int[] nums) {\n        int first = Integer.MIN_VALUE, second = Integer.MIN_VALUE;\n        for (int num : nums) {\n            if (num \u003e first) {\n                second = first;\n                first = num;\n            } else if (num \u003e second \u0026\u0026 num != first) {\n                second = num;\n            }\n        }\n        return second != Integer.MIN_VALUE ? second : -1;\n    }\n}", "extra": false, "n": 42}, {"title": "Remove Duplicate from sorted", "topics": ["Array"], "file": "RemoveDuplicateFromSorted.java", "code": "// In-place; returns new length. `i` tracks the last unique slot.\nclass RemoveDuplicateFromSorted {\n    static int removeDuplicateFromSorted(int[] nums) {\n        int n = nums.length;\n        if (n == 0) return 0;\n        int i = 0;\n        for (int j = 0; j \u003c n; j++) {\n            if (nums[i] == nums[j]) continue;\n            i++;\n            nums[i] = nums[j];\n        }\n        return i + 1;\n    }\n}", "extra": false, "n": 43}, {"title": "Move zeros to end", "topics": ["Array"], "file": "MoveZerosToEnd.java", "code": "// Two pointers: swap non-zeros to the front, zeros drift to the end.\nclass MoveZerosToEnd {\n    static void moveZerosToEnd(int[] nums) {\n        int n = nums.length;\n        int i = 0;\n        for (int j = 0; j \u003c n; j++) {\n            if (nums[j] == 0) continue;\n            int t = nums[i]; nums[i] = nums[j]; nums[j] = t;\n            i++;\n        }\n    }\n}", "extra": false, "n": 44}, {"title": "Rotate array by K", "topics": ["Array"], "file": "RotateArrayByK.java", "code": "// Left rotation by k, two ways.\nclass RotateArrayByK {\n    // Reverse-based, O(1) extra space.\n    static void reverseRotate(int[] nums, int k) {\n        int n = nums.length;\n        k %= n;\n        reverse(nums, 0, k - 1);\n        reverse(nums, k, n - 1);\n        reverse(nums, 0, n - 1);\n        // for right rotation, reverse the order of the 3 steps\n    }\n\n    // Iterative with an auxiliary array.\n    static void iterativeRotate(int[] nums, int k) {\n        int n = nums.length;\n        k %= n;\n        int[] ans = new int[n];\n        for (int i = 0; i \u003c n; i++) {\n            ans[(i + k) % n] = nums[i]; // push element at i to (i + k) % n\n        }\n        System.arraycopy(ans, 0, nums, 0, n);\n    }\n\n    private static void reverse(int[] a, int l, int r) {\n        while (l \u003c r) { int t = a[l]; a[l] = a[r]; a[r] = t; l++; r--; }\n    }\n}", "extra": false, "n": 45}, {"title": "Missing number", "topics": ["Array"], "file": "MissingNumber.java", "code": "// Sum 0..n minus actual sum = the missing value.\nclass MissingNumber {\n    static int missingNumber(int[] nums) {\n        int n = nums.length;\n        int tSum = n * (n + 1) / 2;\n        int sum = 0;\n        for (int num : nums) sum += num;\n        return tSum - sum;\n    }\n}", "extra": false, "n": 46}, {"title": "Maximum consecutive ones", "topics": ["Array"], "file": "MaximumConsecutiveOnes.java", "code": "class MaximumConsecutiveOnes {\n    static int maximumConsecutiveOnes(int[] nums) {\n        int count = 0, ans = 0;\n        for (int num : nums) {\n            if (num == 1) count++;\n            else count = 0;\n            ans = Math.max(ans, count);\n        }\n        return ans;\n    }\n}", "extra": false, "n": 47}, {"title": "Single Appearence", "topics": ["Array"], "file": "SingleAppearance.java", "code": "// Every element appears twice except one; XOR cancels the pairs.\nclass SingleAppearance {\n    static int findNumberWhichAppearsOnce(int[] nums) {\n        int ans = 0;\n        for (int num : nums) ans ^= num;\n        return ans;\n    }\n}", "extra": false, "n": 48}, {"title": "Sort Array 012", "topics": ["Array"], "file": "SortArray012.java", "code": "// Dutch National Flag: partition 0s, 1s, 2s in one pass.\nclass SortArray012 {\n    static void sortArrZeroOneTwo(int[] nums) {\n        int n = nums.length;\n        int i = 0, j = 0, k = n - 1;\n        while (j \u003c= k) {\n            if (nums[j] == 0) {\n                swap(nums, i, j); i++; j++;\n            } else if (nums[j] == 1) {\n                j++;\n            } else {\n                swap(nums, j, k); k--;\n            }\n        }\n    }\n\n    private static void swap(int[] a, int x, int y) { int t = a[x]; a[x] = a[y]; a[y] = t; }\n}", "extra": false, "n": 49}, {"title": "Majority element", "topics": ["Array"], "file": "MajorityElement.java", "code": "// Boyer-Moore voting (element appearing \u003e n/2 times).\nclass MajorityElement {\n    static int majorityElement(int[] nums) {\n        int votes = 0, ans = 0;\n        for (int num : nums) {\n            if (votes == 0) ans = num;\n            if (ans == num) votes++;\n            else votes--;\n        }\n        return ans;\n    }\n}", "extra": false, "n": 50}, {"title": "Upper Bound(Reverse)", "topics": ["Binary search"], "file": "UpperBoundReverse.java", "code": "// In a DESCENDING-sorted range [l, r], return the index of the last element\n// strictly greater than val. Used by Next Permutation on the descending suffix.\nclass UpperBoundReverse {\n    static int upperBoundDecOrder(int[] nums, int l, int r, int val) {\n        int ans = r + 1;\n        while (l \u003c= r) {\n            int m = l + (r - l) / 2;\n            if (nums[m] \u003e val) {\n                ans = m;\n                l = m + 1;\n            } else {\n                r = m - 1;\n            }\n        }\n        return ans;\n    }\n}", "extra": false, "n": 51}, {"title": "Next Permutation", "topics": ["Array"], "file": "NextPermutation.java", "code": "// In-place next lexicographic permutation.\nclass NextPermutation {\n    static void nextPermutation(int[] nums) {\n        int n = nums.length;\n        int i = n - 2;\n        // find the first index from the right where nums[i] \u003c nums[i+1]\n        // (\u003e= skips equal elements, so this is correct for duplicates)\n        while (i \u003e -1 \u0026\u0026 nums[i] \u003e= nums[i + 1]) i--;\n        if (i == -1) {\n            reverse(nums, 0, n - 1);\n            return;\n        }\n        int idx = UpperBoundReverse.upperBoundDecOrder(nums, i + 1, n - 1, nums[i]);\n        swap(nums, i, idx);\n        reverse(nums, i + 1, n - 1);\n    }\n\n    private static void reverse(int[] a, int l, int r) { while (l \u003c r) swap(a, l++, r--); }\n    private static void swap(int[] a, int x, int y) { int t = a[x]; a[x] = a[y]; a[y] = t; }\n}", "extra": false, "n": 52}, {"title": "Longest Consecutive", "topics": ["Array"], "file": "LongestConsecutive.java", "code": "import java.util.*;\n\n// O(n) using a set; only start counting at sequence heads (num-1 absent).\nclass LongestConsecutive {\n    static int longestConsecutive(int[] nums) {\n        int ans = 0;\n        Set\u003cInteger\u003e set = new HashSet\u003c\u003e();\n        for (int num : nums) set.add(num);\n        for (int num : set) {\n            int count = 0;\n            if (!set.contains(num - 1)) {\n                count = 1;\n                int cur = num;\n                while (set.contains(cur + 1)) { cur++; count++; }\n            }\n            ans = Math.max(ans, count);\n        }\n        return ans;\n    }\n}", "extra": false, "n": 53}, {"title": "Set zeros in matrix", "topics": ["Array"], "file": "SetZerosInMatrix.java", "code": "import java.util.*;\n\nclass SetZerosInMatrix {\n    static void setZerosInMatrix(int[][] matrix) {\n        int m = matrix.length, n = matrix[0].length;\n        int[] rows = new int[m], cols = new int[n];\n        Arrays.fill(rows, 1);\n        Arrays.fill(cols, 1);\n        for (int r = 0; r \u003c m; r++)\n            for (int c = 0; c \u003c n; c++)\n                if (matrix[r][c] == 0) { rows[r] = 0; cols[c] = 0; }\n\n        for (int r = 0; r \u003c m; r++)\n            for (int c = 0; c \u003c n; c++)\n                if (rows[r] * cols[c] == 0) matrix[r][c] = 0;\n    }\n}", "extra": false, "n": 54}, {"title": "Rotate matrix", "topics": ["Array"], "file": "RotateMatrix.java", "code": "// Rotate a square matrix 90 degrees: transpose, then flip horizontally.\nclass RotateMatrix {\n    static void rotateSquareGrid(int[][] matrix) {\n        transpose(matrix);\n        hFlip(matrix);\n    }\n\n    static void transpose(int[][] matrix) {\n        int m = matrix.length, n = matrix[0].length;\n        for (int r = 0; r \u003c m; r++)\n            for (int c = r; c \u003c n; c++)\n                swap(matrix, r, c, c, r);\n    }\n\n    static void hFlip(int[][] matrix) {\n        int n = matrix.length;\n        for (int r = 0; r \u003c n; r++)\n            for (int c = 0; c \u003c n / 2; c++)\n                swap(matrix, r, c, r, n - 1 - c);\n    }\n\n    private static void swap(int[][] a, int r1, int c1, int r2, int c2) {\n        int t = a[r1][c1]; a[r1][c1] = a[r2][c2]; a[r2][c2] = t;\n    }\n}", "extra": false, "n": 55}, {"title": "Merge sorted array", "topics": ["Array"], "file": "MergeSortedArray.java", "code": "// nums1 has m valid values then n empty slots; nums2 has n values. Merge in place from the back.\nclass MergeSortedArray {\n    static void merge(int[] nums1, int m, int[] nums2, int n) {\n        int i = m - 1, j = n - 1, k = m + n - 1;\n        while (j \u003e -1) {\n            if (i \u003e -1 \u0026\u0026 nums1[i] \u003e nums2[j]) nums1[k--] = nums1[i--];\n            else nums1[k--] = nums2[j--];\n        }\n    }\n}", "extra": false, "n": 56}, {"title": "Spiral matrix", "topics": ["Array"], "file": "SpiralMatrix.java", "code": "import java.util.*;\n\nclass SpiralMatrix {\n    static List\u003cInteger\u003e spiralMatrix(int[][] matrix) {\n        int m = matrix.length, n = matrix[0].length;\n        List\u003cInteger\u003e ans = new ArrayList\u003c\u003e();\n        int[][] dirs = {{0, 1}, {1, 0}, {0, -1}, {-1, 0}};\n        boolean[][] visited = new boolean[m][n];\n\n        int r = 0, c = 0, d = 0;\n        for (int i = 0; i \u003c m * n; i++) {\n            ans.add(matrix[r][c]);\n            visited[r][c] = true;\n\n            int nr = r + dirs[d][0];\n            int nc = c + dirs[d][1];\n            if (nr \u003c 0 || nc \u003c 0 || nr \u003e= m || nc \u003e= n || visited[nr][nc]) {\n                d = (d + 1) % 4;\n                nr = r + dirs[d][0];\n                nc = c + dirs[d][1];\n            }\n            r = nr;\n            c = nc;\n        }\n        return ans;\n    }\n}", "extra": false, "n": 57}, {"title": "Pascal triangle", "topics": ["Array"], "file": "PascalTriangle.java", "code": "import java.util.*;\n\nclass PascalTriangle {\n    static List\u003cList\u003cInteger\u003e\u003e pascalTriangle(int rows) {\n        List\u003cList\u003cInteger\u003e\u003e ans = new ArrayList\u003c\u003e();\n        for (int row = 1; row \u003c= rows; row++) {\n            if (row == 1) {\n                ans.add(new ArrayList\u003c\u003e(List.of(1)));\n                continue;\n            }\n            List\u003cInteger\u003e temp = new ArrayList\u003c\u003e();\n            List\u003cInteger\u003e prev = ans.get(ans.size() - 1);\n            temp.add(1);\n            for (int col = 1; col \u003c prev.size(); col++) temp.add(prev.get(col - 1) + prev.get(col));\n            temp.add(1);\n            ans.add(temp);\n        }\n        return ans;\n    }\n}", "extra": false, "n": 58}, {"title": "Majority element II", "topics": ["Array"], "file": "MajorityElementII.java", "code": "import java.util.*;\n\n// Boyer-Moore for elements appearing \u003e n/3 times (at most two candidates).\nclass MajorityElementII {\n    static List\u003cInteger\u003e majorityElementII(int[] nums) {\n        List\u003cInteger\u003e ans = new ArrayList\u003c\u003e();\n        int n = nums.length;\n        int ans1 = Integer.MIN_VALUE, ans2 = Integer.MIN_VALUE, votes1 = 0, votes2 = 0;\n        for (int num : nums) {\n            if (ans1 == num) votes1++;\n            else if (ans2 == num) votes2++;\n            else if (votes1 == 0) { ans1 = num; votes1 = 1; }\n            else if (votes2 == 0) { ans2 = num; votes2 = 1; }\n            else { votes1--; votes2--; }\n        }\n\n        int c1 = 0, c2 = 0;\n        for (int num : nums) {\n            if (num == ans1) c1++;\n            else if (num == ans2) c2++;\n        }\n        if (c1 \u003e n / 3) ans.add(ans1);\n        if (c2 \u003e n / 3) ans.add(ans2); // (original had a typo adding ans1 twice)\n        return ans;\n    }\n}", "extra": false, "n": 59}, {"title": "Threesome", "topics": ["Array"], "file": "Threesome.java", "code": "import java.util.*;\n\n// 3Sum: all unique triplets summing to 0.\nclass Threesome {\n    static List\u003cList\u003cInteger\u003e\u003e threesome(int[] nums) {\n        int n = nums.length;\n        List\u003cList\u003cInteger\u003e\u003e ans = new ArrayList\u003c\u003e();\n        Arrays.sort(nums);\n\n        for (int i = 0; i \u003c n; i++) {\n            if (i \u003e 0 \u0026\u0026 nums[i - 1] == nums[i]) continue;\n\n            int j = i + 1, k = n - 1;\n            while (j \u003c k) {\n                int sum = nums[i] + nums[j] + nums[k];\n                if (sum \u003c 0) {\n                    j++;\n                } else if (sum \u003e 0) {\n                    k--;\n                } else {\n                    ans.add(List.of(nums[i], nums[j++], nums[k--]));\n                    while (j \u003c k \u0026\u0026 nums[j - 1] == nums[j]) j++;\n                    while (j \u003c k \u0026\u0026 nums[k] == nums[k + 1]) k--;\n                }\n            }\n        }\n        return ans;\n    }\n}", "extra": false, "n": 60}, {"title": "Valid parenthesis", "topics": ["Stack"], "file": "ValidParenthesis.java", "code": "import java.util.*;\n\nclass ValidParenthesis {\n    static boolean isValid(String s) {\n        Deque\u003cCharacter\u003e stk = new ArrayDeque\u003c\u003e();\n        for (char c : s.toCharArray()) {\n            if (!stk.isEmpty() \u0026\u0026 isClose(c) \u0026\u0026 isMatch(stk.peek(), c)) {\n                stk.pop();\n                continue;\n            }\n            stk.push(c);\n        }\n        return stk.isEmpty();\n    }\n\n    private static boolean isClose(char c) {\n        return c == ')' || c == ']' || c == '}';\n    }\n\n    private static boolean isMatch(char c1, char c2) {\n        return (c1 == '(' \u0026\u0026 c2 == ')')\n            || (c1 == '[' \u0026\u0026 c2 == ']')\n            || (c1 == '{' \u0026\u0026 c2 == '}');\n    }\n}", "extra": false, "n": 61}, {"title": "Maximum matrix sum", "topics": ["Grid"], "file": "MaxMatrixSum.java", "code": "// https://leetcode.com/problems/maximum-matrix-sum/\n// Flipping two adjacent signs can move a \"-\" anywhere. If the count of non-positive\n// cells is even, all can be made positive; if odd, one smallest |value| stays negative.\nclass MaxMatrixSum {\n    static long maxMatrixSum(int[][] matrix) {\n        int n = matrix.length;\n        int neg = 0, minimum = Integer.MAX_VALUE;\n        long ans = 0;\n        for (int r = 0; r \u003c n; r++) {\n            for (int c = 0; c \u003c n; c++) {\n                int val = matrix[r][c];\n                if (val \u003c= 0) neg++;\n                ans += Math.abs(val);\n                minimum = Math.min(minimum, Math.abs(val));\n            }\n        }\n        return (neg % 2 == 0) ? ans : ans - 2L * minimum;\n    }\n}", "extra": false, "n": 62}, {"title": "Climbing Stairs", "topics": ["DP", "DFS"], "file": "ClimbingStairs.java", "code": "import java.util.*;\n\n// Ways to reach step n taking 1 or 2 steps at a time (top-down DP).\nclass ClimbingStairs {\n    static int climbStairs(int n) {\n        int[] cache = new int[Math.max(n, 1)];\n        Arrays.fill(cache, -1);\n        return dfs(0, n, cache);\n    }\n\n    private static int dfs(int i, int n, int[] cache) {\n        if (i \u003e= n) return i == n ? 1 : 0;\n        if (cache[i] != -1) return cache[i];\n        int ans = dfs(i + 1, n, cache) + dfs(i + 2, n, cache);\n        return cache[i] = ans;\n    }\n}", "extra": false, "n": 63}, {"title": "Assign Cookies", "topics": ["Greedy"], "file": "AssignCookies.java", "code": "import java.util.*;\n\n// Greedy: satisfy the greediest children with the largest cookies first.\nclass AssignCookies {\n    static int assignCookies(int[] g, int[] s) {\n        int ans = 0, n = g.length, m = s.length;\n        Arrays.sort(g);\n        Arrays.sort(s);\n        for (int i = n - 1, j = m - 1; i \u003e -1 \u0026\u0026 j \u003e -1; i--) {\n            if (s[j] \u003e= g[i]) {\n                ans++;\n                j--;\n            }\n        }\n        return ans;\n    }\n}", "extra": false, "n": 64}, {"title": "Jump Game I/II", "topics": ["DP", "DFS", "Greedy"], "file": "JumpGame.java", "code": "// Jump Game I: can we reach the last index? (Greedy \"leader\" scan.)\n// For Jump Game II (min jumps), uncomment the `jumps` bookkeeping.\nclass JumpGame {\n    static boolean canJump(int[] nums) {\n        int n = nums.length;\n        if (n == 1) return true;\n\n        int farthest = 0, leader = 0;\n        boolean ans = false;\n        // int jumps = 0; // Jump Game II\n        for (int i = 0; i \u003c n - 1; i++) {\n            farthest = Math.max(farthest, i + nums[i]);\n            if (i == leader) {\n                leader = farthest;\n                // jumps++; // Jump Game II\n                if (leader == 0) break;                 // stuck at a 0 with no reach\n                if (leader \u003e= n - 1) { ans = true; break; }\n            }\n        }\n        return ans;\n    }\n}", "extra": false, "n": 65}, {"title": "Disjoint Set Union(DSU)", "topics": ["DSU"], "file": "DSU.java", "code": "// Disjoint Set Union with path compression + union by rank (shared type).\nclass DSU {\n    private int[] parent, rank;\n\n    DSU(int n) {\n        parent = new int[n];\n        rank = new int[n];\n        for (int i = 0; i \u003c n; i++) parent[i] = i;\n    }\n\n    int find(int a) {\n        if (parent[a] == a) return a;\n        return parent[a] = find(parent[a]); // path compression\n    }\n\n    void join(int a, int b) {\n        int pa = find(a), pb = find(b);\n        if (pa == pb) return;\n\n        if (rank[pa] \u003c rank[pb]) {\n            parent[pa] = pb;\n        } else if (rank[pb] \u003c rank[pa]) {\n            parent[pb] = pa;\n        } else {\n            parent[pb] = pa;\n            rank[pa]++;\n        }\n    }\n}", "extra": false, "n": 66}, {"title": "Number of Islands", "topics": ["Graph", "DFS", "BFS"], "file": "NumberOfIslands.java", "code": "// Count connected groups of '1' in a char grid; sink each island via DFS.\nclass NumberOfIslands {\n    private static final int[][] DIRS = {{-1, 0}, {0, 1}, {1, 0}, {0, -1}};\n\n    static int numberOfIslands(char[][] grid) {\n        int m = grid.length, n = grid[0].length;\n        int ans = 0;\n        for (int i = 0; i \u003c m; i++)\n            for (int j = 0; j \u003c n; j++)\n                ans += dfs(grid, i, j, m, n);\n        return ans;\n    }\n\n    private static int dfs(char[][] grid, int r, int c, int m, int n) {\n        if (r \u003c 0 || c \u003c 0 || r \u003e= m || c \u003e= n || grid[r][c] == '0') return 0;\n        grid[r][c] = '0';\n        for (int[] d : DIRS) dfs(grid, r + d[0], c + d[1], m, n);\n        return 1;\n    }\n}", "extra": false, "n": 67}, {"title": "House Robber", "topics": ["DP", "DFS"], "file": "HouseRobber.java", "code": "import java.util.*;\n\n// Max sum of non-adjacent houses (top-down DP).\nclass HouseRobber {\n    static int houseRobber(int[] nums) {\n        int[] cache = new int[nums.length];\n        Arrays.fill(cache, -1);\n        return dfs(0, nums, cache);\n    }\n\n    private static int dfs(int i, int[] nums, int[] cache) {\n        if (i \u003e= nums.length) return 0;\n        if (cache[i] != -1) return cache[i];\n        int take = nums[i] + dfs(i + 2, nums, cache);\n        int dontTake = dfs(i + 1, nums, cache);\n        return cache[i] = Math.max(take, dontTake);\n    }\n}", "extra": false, "n": 68}, {"title": "House Robber II", "topics": ["DP", "DFS"], "file": "HouseRobberII.java", "code": "import java.util.*;\n\n// Houses in a circle: rob either [0, n-2] or [1, n-1], never both ends.\nclass HouseRobberII {\n    static int houseRobber(int[] nums) {\n        int n = nums.length;\n        if (n == 1) return nums[0];\n        return Math.max(solve(nums, 0, n - 2), solve(nums, 1, n - 1));\n    }\n\n    private static int solve(int[] nums, int l, int r) {\n        int[] cache = new int[nums.length];\n        Arrays.fill(cache, -1);\n        return dfs(nums, l, r, cache);\n    }\n\n    private static int dfs(int[] nums, int i, int r, int[] cache) {\n        if (i \u003e r) return 0;\n        if (cache[i] != -1) return cache[i];\n        int take = nums[i] + dfs(nums, i + 2, r, cache);\n        int dontTake = dfs(nums, i + 1, r, cache);\n        return cache[i] = Math.max(take, dontTake);\n    }\n}", "extra": false, "n": 69}, {"title": "Unique Paths", "topics": ["DP", "Grid"], "file": "UniquePaths.java", "code": "import java.util.*;\n\n// Paths from top-left to bottom-right moving only down/right.\nclass UniquePaths {\n    static int uniquePaths(int m, int n) {\n        int[][] cache = new int[m][n];\n        for (int[] row : cache) Arrays.fill(row, -1);\n        return dfs(0, 0, m, n, cache);\n    }\n\n    private static int dfs(int r, int c, int m, int n, int[][] cache) {\n        if (r \u003c 0 || c \u003c 0 || r \u003e= m || c \u003e= n) return 0;\n        if (r == m - 1 \u0026\u0026 c == n - 1) return 1;\n        if (cache[r][c] != -1) return cache[r][c];\n        int ans = dfs(r + 1, c, m, n, cache) + dfs(r, c + 1, m, n, cache);\n        return cache[r][c] = ans;\n    }\n}", "extra": false, "n": 70}, {"title": "Minimum Path Sum", "topics": ["DP", "Grid"], "file": "MinimumPathSum.java", "code": "import java.util.*;\n\nclass MinimumPathSum {\n    private static final int INF = 1_000_000_000;\n\n    static int minimumPathSum(int[][] grid) {\n        int m = grid.length, n = grid[0].length;\n        int[][] cache = new int[m][n];\n        for (int[] row : cache) Arrays.fill(row, -1);\n        return dfs(0, 0, grid, m, n, cache);\n    }\n\n    private static int dfs(int r, int c, int[][] grid, int m, int n, int[][] cache) {\n        if (r == m || c == n) return INF;\n        if (r == m - 1 \u0026\u0026 c == n - 1) return grid[r][c];\n        if (cache[r][c] != -1) return cache[r][c];\n        int minimum = Math.min(dfs(r, c + 1, grid, m, n, cache), dfs(r + 1, c, grid, m, n, cache));\n        return cache[r][c] = grid[r][c] + minimum;\n    }\n}", "extra": false, "n": 71}, {"title": "Minimum Falling Path Sum", "topics": ["DP", "Grid"], "file": "MinimumFallingPathSum.java", "code": "import java.util.*;\n\n// Fall top-\u003ebottom, moving to the cell directly below or diagonally below.\nclass MinimumFallingPathSum {\n    private static final int INF = 1_000_000_000;\n    private static final int[][] DIRS = {{1, -1}, {1, 0}, {1, 1}};\n\n    static int minimumFallingPathSum(int[][] matrix) {\n        int m = matrix.length, n = matrix[0].length;\n        int[][] cache = new int[m][n];\n        for (int[] row : cache) Arrays.fill(row, -1);\n\n        int ans = INF;\n        for (int c = 0; c \u003c n; c++) ans = Math.min(ans, dfs(0, c, matrix, m, n, cache));\n        return ans;\n    }\n\n    private static int dfs(int r, int c, int[][] matrix, int m, int n, int[][] cache) {\n        if (r \u003c 0 || c \u003c 0 || r \u003e= m || c \u003e= n) return INF;\n        if (r == m - 1) return matrix[r][c];\n        if (cache[r][c] != -1) return cache[r][c];\n\n        int ans = INF;\n        for (int[] d : DIRS) {\n            int next = dfs(r + d[0], c + d[1], matrix, m, n, cache);\n            if (next != INF) ans = Math.min(ans, matrix[r][c] + next);\n        }\n        return cache[r][c] = ans;\n    }\n}", "extra": false, "n": 72}, {"title": "Minimum Path Sum in Triangle", "topics": ["DP", "Triangle"], "file": "MinimumPathSumTriangle.java", "code": "import java.util.*;\n\nclass MinimumPathSumTriangle {\n    static int minimumPathSumTriangle(int[][] triangle) {\n        int m = triangle.length;\n        int[][] cache = new int[m][m];\n        for (int[] row : cache) Arrays.fill(row, -1);\n        return dfs(0, 0, triangle, m, cache);\n    }\n\n    private static int dfs(int r, int c, int[][] triangle, int m, int[][] cache) {\n        if (r \u003e= m) return Integer.MAX_VALUE;\n        if (r == m - 1) return triangle[r][c];\n        if (cache[r][c] != -1) return cache[r][c];\n        return cache[r][c] = triangle[r][c]\n            + Math.min(dfs(r + 1, c, triangle, m, cache), dfs(r + 1, c + 1, triangle, m, cache));\n    }\n}", "extra": false, "n": 73}, {"title": "Combination Sum I/II", "topics": ["DP", "Knapsack", "Backtracking"], "file": "CombinationSum.java", "code": "import java.util.*;\n\n// Unbounded = reuse each element; Bounded = use once (swap the marked recursive call).\nclass CombinationSum {\n    static List\u003cList\u003cInteger\u003e\u003e combinationSum(int[] nums, int target) {\n        List\u003cList\u003cInteger\u003e\u003e ans = new ArrayList\u003c\u003e();\n        dfs(0, 0, new ArrayList\u003c\u003e(), nums, target, ans);\n        return ans;\n    }\n\n    private static void dfs(int i, int sum, List\u003cInteger\u003e temp, int[] nums, int target, List\u003cList\u003cInteger\u003e\u003e ans) {\n        if (sum \u003e target) return; // prune (needed so the unbounded branch terminates)\n        if (i \u003e= nums.length) {\n            if (sum == target) ans.add(new ArrayList\u003c\u003e(temp));\n            return;\n        }\n\n        sum += nums[i];\n        temp.add(nums[i]);\n        dfs(i, sum, temp, nums, target, ans);        // unbounded knapsack\n        // dfs(i + 1, sum, temp, nums, target, ans); // bounded knapsack\n        temp.remove(temp.size() - 1);\n        sum -= nums[i];\n\n        dfs(i + 1, sum, temp, nums, target, ans);\n    }\n}", "extra": false, "n": 74}, {"title": "Equal Partition Subset Sum", "topics": ["DP", "Knapsack"], "file": "EqualPartitionSubsetSum.java", "code": "import java.util.*;\n\n// Can the array split into two subsets of equal sum? (= subset summing to total/2)\n// NOTE: rewritten as a clean subset-sum DP; the original's cache indexing was buggy.\nclass EqualPartitionSubsetSum {\n    static boolean canPartition(int[] input) {\n        int total = 0;\n        for (int x : input) total += x;\n        if ((total \u0026 1) == 1) return false;\n\n        int target = total / 2, n = input.length;\n        int[][] cache = new int[n][target + 1];\n        for (int[] row : cache) Arrays.fill(row, -1);\n        return dfs(0, target, input, cache);\n    }\n\n    private static boolean dfs(int i, int rem, int[] nums, int[][] cache) {\n        if (rem == 0) return true;\n        if (i \u003e= nums.length || rem \u003c 0) return false;\n        if (cache[i][rem] != -1) return cache[i][rem] == 1;\n\n        boolean ans = dfs(i + 1, rem - nums[i], nums, cache) || dfs(i + 1, rem, nums, cache);\n        cache[i][rem] = ans ? 1 : 0;\n        return ans;\n    }\n}", "extra": false, "n": 75}, {"title": "Coin Change", "topics": ["DP"], "file": "CoinChange.java", "code": "import java.util.*;\n\n// Fewest coins to make `amount` (infinite supply); -1 if impossible.\nclass CoinChange {\n    private static final int INF = 1_000_000_000;\n\n    static int coinChange(int[] coins, int amount) {\n        int n = coins.length;\n        int[][] cache = new int[n + 1][amount + 1];\n        for (int[] row : cache) Arrays.fill(row, -1);\n        int ans = dfs(0, amount, coins, cache);\n        return ans \u003e= INF ? -1 : ans;\n    }\n\n    private static int dfs(int i, int target, int[] coins, int[][] cache) {\n        if (target == 0) return 0;\n        if (i \u003e= coins.length || target \u003c 0) return INF;\n        if (cache[i][target] != -1) return cache[i][target];\n\n        int pick = 1 + dfs(i, target - coins[i], coins, cache);\n        int dontPick = dfs(i + 1, target, coins, cache);\n        return cache[i][target] = Math.min(pick, dontPick);\n    }\n}", "extra": false, "n": 76}, {"title": "Coin Change II", "topics": ["DP"], "file": "CoinChangeII.java", "code": "import java.util.*;\n\n// Number of combinations that make `amount` (infinite supply).\nclass CoinChangeII {\n    static int coinChangeII(int amount, int[] coins) {\n        int n = coins.length;\n        int[][] cache = new int[n + 1][amount + 1];\n        for (int[] row : cache) Arrays.fill(row, -1);\n        return dfs(0, amount, coins, cache);\n    }\n\n    private static int dfs(int i, int target, int[] coins, int[][] cache) {\n        if (target == 0) return 1;\n        if (i \u003e= coins.length || target \u003c 0) return 0;\n        if (cache[i][target] != -1) return cache[i][target];\n\n        int pick = dfs(i, target - coins[i], coins, cache);\n        int dontPick = dfs(i + 1, target, coins, cache);\n        return cache[i][target] = pick + dontPick;\n    }\n}", "extra": false, "n": 77}, {"title": "Target Sum", "topics": ["DP"], "file": "TargetSum.java", "code": "import java.util.*;\n\n// Assign +/- to each number so the signed sum equals target; count the ways.\nclass TargetSum {\n    static int findTargetSumWays(int[] nums, int target) {\n        return dfs(0, 0, nums, target, new HashMap\u003c\u003e());\n    }\n\n    private static int dfs(int i, int sum, int[] nums, int target, Map\u003cString, Integer\u003e cache) {\n        if (i == nums.length) return sum == target ? 1 : 0;\n        String key = i + \"+\" + sum;\n        if (cache.containsKey(key)) return cache.get(key);\n        int ans = dfs(i + 1, sum + nums[i], nums, target, cache)\n                + dfs(i + 1, sum - nums[i], nums, target, cache);\n        cache.put(key, ans);\n        return ans;\n    }\n}", "extra": false, "n": 78}, {"title": "Longest Common Subsequence", "topics": ["DP", "String"], "file": "LongestCommonSubsequence.java", "code": "import java.util.*;\n\n// text1=\"abcde\", text2=\"ace\" -\u003e 3 (\"ace\")\nclass LongestCommonSubsequence {\n    static int longestCommonSubsequence(String s1, String s2) {\n        int m = s1.length(), n = s2.length();\n        int[][] cache = new int[m][n];\n        for (int[] row : cache) Arrays.fill(row, -1);\n        return dfs(0, 0, s1, s2, cache);\n    }\n\n    private static int dfs(int i, int j, String s1, String s2, int[][] cache) {\n        if (i \u003e= s1.length() || j \u003e= s2.length()) return 0;\n        if (cache[i][j] != -1) return cache[i][j];\n\n        int ans;\n        if (s1.charAt(i) == s2.charAt(j)) {\n            ans = 1 + dfs(i + 1, j + 1, s1, s2, cache);\n        } else {\n            ans = Math.max(dfs(i + 1, j, s1, s2, cache), dfs(i, j + 1, s1, s2, cache));\n        }\n        return cache[i][j] = ans;\n    }\n}", "extra": false, "n": 79}, {"title": "Longest Increasing Subsequence", "topics": ["DP"], "file": "LongestIncreasingSubsequence.java", "code": "import java.util.*;\n\n// nums=[10,9,2,5,3,7,101,18] -\u003e 4 ([2,3,7,101])\nclass LongestIncreasingSubsequence {\n    // Recursive: (prev index, current index) with memo.\n    static int recursive(int[] nums) {\n        return dfs(-1, 0, nums, new HashMap\u003c\u003e());\n    }\n\n    private static int dfs(int i, int j, int[] nums, Map\u003cLong, Integer\u003e cache) {\n        if (j == nums.length) return 0;\n        long key = ((long) (i + 1) \u003c\u003c 32) | j; // +1 so prev index -1 encodes cleanly\n        if (cache.containsKey(key)) return cache.get(key);\n\n        int ans = dfs(i, j + 1, nums, cache);\n        if (i == -1 || nums[i] \u003c nums[j]) ans = Math.max(ans, 1 + dfs(j, j + 1, nums, cache));\n        cache.put(key, ans);\n        return ans;\n    }\n\n    // Iterative O(n^2) DP (fastest of the two here).\n    static int iterative(int[] nums) {\n        int n = nums.length;\n        int[] dp = new int[n];\n        Arrays.fill(dp, 1);\n        for (int i = n - 2; i \u003e= 0; i--)\n            for (int j = i + 1; j \u003c n; j++)\n                if (nums[i] \u003c nums[j]) dp[i] = Math.max(dp[i], 1 + dp[j]);\n\n        int ans = 0;\n        for (int x : dp) ans = Math.max(ans, x);\n        return ans;\n    }\n}", "extra": false, "n": 80}, {"title": "Longest Palindromic Substring", "topics": ["Two pointer", "String"], "file": "LongestPalindromicSubstring.java", "code": "// Expand around each center (odd + even) and track the longest window.\nclass LongestPalindromicSubstring {\n    static String longestPalindrome(String s) {\n        int n = s.length();\n        int[] res = {0, 0}; // {start, maxLen}\n        for (int i = 0; i \u003c n; i++) {\n            spread(s, i, i, res);\n            spread(s, i, i + 1, res);\n        }\n        return s.substring(res[0], res[0] + res[1]);\n    }\n\n    private static void spread(String s, int i, int j, int[] res) {\n        int n = s.length();\n        while (i \u003e -1 \u0026\u0026 j \u003c n \u0026\u0026 s.charAt(i) == s.charAt(j)) {\n            int len = j - i + 1;\n            if (len \u003e res[1]) {\n                res[1] = len;\n                res[0] = i;\n            }\n            i--;\n            j++;\n        }\n    }\n}", "extra": false, "n": 81}, {"title": "Longest Palindromic Subsequence", "topics": ["DP", "String"], "file": "LongestPalindromicSubsequence.java", "code": "import java.util.*;\n\n// s=\"bbbab\" -\u003e 4 (\"bbbb\")\nclass LongestPalindromicSubsequence {\n    static int longestPalindromeSubsequence(String s) {\n        int n = s.length();\n        int[][] cache = new int[n][n];\n        for (int[] row : cache) Arrays.fill(row, -1);\n        return dfs(0, n - 1, s, cache);\n    }\n\n    private static int dfs(int i, int j, String s, int[][] cache) {\n        if (j \u003c i) return 0;\n        if (j == i) return 1;\n        if (cache[i][j] != -1) return cache[i][j];\n\n        int ans;\n        if (s.charAt(i) == s.charAt(j)) {\n            ans = 2 + dfs(i + 1, j - 1, s, cache);\n        } else {\n            ans = Math.max(dfs(i + 1, j, s, cache), dfs(i, j - 1, s, cache));\n        }\n        return cache[i][j] = ans;\n    }\n}", "extra": false, "n": 82}, {"title": "Edit Distance", "topics": ["DP", "String"], "file": "EditDistance.java", "code": "import java.util.*;\n\n// Min insert/delete/replace ops to turn s1 into s2.\nclass EditDistance {\n    static int editDistance(String s1, String s2) {\n        int m = s1.length(), n = s2.length();\n        int[][] cache = new int[m + 1][n + 1];\n        for (int[] row : cache) Arrays.fill(row, -1);\n        return dfs(0, 0, s1, s2, cache);\n    }\n\n    private static int dfs(int i, int j, String s1, String s2, int[][] cache) {\n        int m = s1.length(), n = s2.length();\n        if (i \u003e= m) return n - j;\n        if (j \u003e= n) return m - i;\n        if (cache[i][j] != -1) return cache[i][j];\n\n        int ans;\n        if (s1.charAt(i) == s2.charAt(j)) {\n            ans = dfs(i + 1, j + 1, s1, s2, cache);\n        } else {\n            int ins = 1 + dfs(i, j + 1, s1, s2, cache);\n            int del = 1 + dfs(i + 1, j, s1, s2, cache);\n            int rep = 1 + dfs(i + 1, j + 1, s1, s2, cache);\n            ans = Math.min(ins, Math.min(del, rep));\n        }\n        return cache[i][j] = ans;\n    }\n}", "extra": false, "n": 83}, {"title": "Max Profit Single Transaction", "topics": ["DP"], "file": "MaxProfitSingleTransaction.java", "code": "// One buy + one sell. Kadane on daily deltas.\nclass MaxProfitSingleTransaction {\n    static int maxProfit(int[] prices) {\n        int n = prices.length;\n        int profit = 0, ans = 0;\n        for (int i = 1; i \u003c n; i++) {\n            profit += prices[i] - prices[i - 1];\n            if (profit \u003c 0) profit = 0;\n            ans = Math.max(ans, profit);\n        }\n        return ans;\n    }\n}", "extra": false, "n": 84}, {"title": "Max Profit Multiple Transactions", "topics": ["DP"], "file": "MaxProfitMultipleTransactions.java", "code": "// Unlimited transactions: grab every positive delta.\nclass MaxProfitMultipleTransactions {\n    static int maxProfit(int[] prices) {\n        int ans = 0;\n        for (int i = 1; i \u003c prices.length; i++) {\n            int profit = prices[i] - prices[i - 1];\n            if (profit \u003e= 0) ans += profit;\n        }\n        return ans;\n    }\n}", "extra": false, "n": 85}, {"title": "Max Profit with Cooldown", "topics": ["DP"], "file": "MaxProfitCooldown.java", "code": "import java.util.*;\n\n// Unlimited transactions with a 1-day cooldown after selling (memoized).\n// prices=[1,2,3,0,2] -\u003e 3  ([buy, sell, cooldown, buy, sell])\nclass MaxProfitCooldown {\n    static int maxProfit(int[] prices) {\n        int n = prices.length;\n        int[][] cache = new int[n][2]; // [i][hold]\n        for (int[] row : cache) Arrays.fill(row, Integer.MIN_VALUE);\n        return dfs(0, 0, prices, cache);\n    }\n\n    private static int dfs(int i, int hold, int[] prices, int[][] cache) {\n        if (i \u003e= prices.length) return 0;\n        if (cache[i][hold] != Integer.MIN_VALUE) return cache[i][hold];\n\n        int ans;\n        if (hold == 0) {\n            int buy = -prices[i] + dfs(i + 1, 1, prices, cache);\n            int skip = dfs(i + 1, 0, prices, cache);\n            ans = Math.max(buy, skip);\n        } else {\n            int sell = prices[i] + dfs(i + 2, 0, prices, cache); // skip a day (cooldown)\n            int skip = dfs(i + 1, 1, prices, cache);\n            ans = Math.max(sell, skip);\n        }\n        return cache[i][hold] = ans;\n    }\n}", "extra": false, "n": 86}, {"title": "Max Profit with Transaction Fee", "topics": ["DP"], "file": "MaxProfitTransactionFee.java", "code": "import java.util.*;\n\n// Unlimited transactions, pay `fee` per completed transaction (memoized).\n// prices=[1,3,2,8,4,9], fee=2 -\u003e 8\nclass MaxProfitTransactionFee {\n    static int maxProfit(int[] prices, int fee) {\n        int n = prices.length;\n        int[][] cache = new int[n][2]; // [i][hold]\n        for (int[] row : cache) Arrays.fill(row, Integer.MIN_VALUE);\n        return dfs(0, 0, prices, fee, cache);\n    }\n\n    private static int dfs(int i, int hold, int[] prices, int fee, int[][] cache) {\n        if (i \u003e= prices.length) return 0;\n        if (cache[i][hold] != Integer.MIN_VALUE) return cache[i][hold];\n\n        int ans;\n        if (hold == 0) {\n            int buy = -prices[i] + dfs(i + 1, 1, prices, fee, cache);\n            int skip = dfs(i + 1, 0, prices, fee, cache);\n            ans = Math.max(buy, skip);\n        } else {\n            int sell = prices[i] - fee + dfs(i + 1, 0, prices, fee, cache);\n            int skip = dfs(i + 1, 1, prices, fee, cache);\n            ans = Math.max(sell, skip);\n        }\n        return cache[i][hold] = ans;\n    }\n}", "extra": false, "n": 87}, {"title": "Number of Connected Components", "topics": ["Graph"], "file": "NumberOfConnectedComponents.java", "code": "import java.util.*;\n\n// graph = adjacency list. Count connected components via DFS.\nclass NumberOfConnectedComponents {\n    static int numberOfConnectedComponent(List\u003cList\u003cInteger\u003e\u003e graph) {\n        int n = graph.size();\n        boolean[] vis = new boolean[n];\n        int components = 0;\n        for (int i = 0; i \u003c n; i++) {\n            if (!vis[i]) {\n                components++;\n                dfs(i, graph, vis);\n            }\n        }\n        return components;\n    }\n\n    private static void dfs(int u, List\u003cList\u003cInteger\u003e\u003e graph, boolean[] vis) {\n        vis[u] = true;\n        for (int v : graph.get(u)) if (!vis[v]) dfs(v, graph, vis);\n    }\n}", "extra": false, "n": 88}, {"title": "Rotten Oranges", "topics": ["Graph", "BFS"], "file": "RottenOranges.java", "code": "import java.util.*;\n\n// 0 empty, 1 fresh, 2 rotten. Multi-source BFS; return minutes until none fresh, else -1.\nclass RottenOranges {\n    static int rottenOranges(int[][] grid) {\n        int m = grid.length, n = grid[0].length;\n        int[][] dirs = {{1, 0}, {-1, 0}, {0, 1}, {0, -1}};\n\n        Queue\u003cint[]\u003e q = new ArrayDeque\u003c\u003e();\n        int fresh = 0;\n        for (int i = 0; i \u003c m; i++)\n            for (int j = 0; j \u003c n; j++)\n                if (grid[i][j] == 2) q.add(new int[]{i, j});\n                else if (grid[i][j] == 1) fresh++;\n\n        int ans = 0;\n        while (!q.isEmpty()) {\n            if (fresh == 0) break;\n            int size = q.size();\n            while (size-- \u003e 0) {\n                int[] cell = q.poll();\n                int r = cell[0], c = cell[1];\n                for (int[] d : dirs) {\n                    int nr = r + d[0], nc = c + d[1];\n                    if (nr \u003c 0 || nc \u003c 0 || nr \u003e= m || nc \u003e= n || grid[nr][nc] == 2 || grid[nr][nc] == 0) continue;\n                    grid[nr][nc] = 2;\n                    fresh--;\n                    q.add(new int[]{nr, nc});\n                }\n            }\n            ans++;\n        }\n        return fresh == 0 ? ans : -1;\n    }\n}", "extra": false, "n": 89}, {"title": "Flood Fill", "topics": ["Graph", "DFS"], "file": "FloodFill.java", "code": "class FloodFill {\n    private static final int[][] DIRS = {{1, 0}, {-1, 0}, {0, 1}, {0, -1}};\n\n    static int[][] floodFill(int[][] image, int sr, int sc, int color) {\n        int m = image.length, n = image[0].length;\n        int targetColor = image[sr][sc];\n        dfs(image, sr, sc, color, targetColor, m, n);\n        return image;\n    }\n\n    private static void dfs(int[][] image, int r, int c, int color, int targetColor, int m, int n) {\n        if (targetColor == color) return; // avoids infinite recursion when already the target color\n        if (r \u003c 0 || c \u003c 0 || r \u003e= m || c \u003e= n || image[r][c] != targetColor) return;\n        image[r][c] = color;\n        for (int[] d : DIRS) dfs(image, r + d[0], c + d[1], color, targetColor, m, n);\n    }\n}", "extra": false, "n": 90}, {"title": "Nearest Zero in 01 Matrix", "topics": ["Graph", "BFS"], "file": "NearestZero01Matrix.java", "code": "import java.util.*;\n\n// Distance of each cell to the nearest 0. Multi-source BFS from all zeros.\nclass NearestZero01Matrix {\n    static int[][] nearestZero(int[][] mat) {\n        int m = mat.length, n = mat[0].length;\n        int[][] dirs = {{0, 1}, {1, 0}, {0, -1}, {-1, 0}};\n        Queue\u003cint[]\u003e q = new ArrayDeque\u003c\u003e();\n\n        for (int i = 0; i \u003c m; i++)\n            for (int j = 0; j \u003c n; j++)\n                if (mat[i][j] == 0) q.add(new int[]{i, j});\n                else mat[i][j] = -1; // mark unvisited\n\n        while (!q.isEmpty()) {\n            int[] cell = q.poll();\n            int r = cell[0], c = cell[1];\n            for (int[] d : dirs) {\n                int nr = r + d[0], nc = c + d[1];\n
